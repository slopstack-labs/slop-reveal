name: Build (Linux)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Linux x64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libcapstone-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            cmake \
            build-essential \
            pkg-config

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Smoke test
        run: ./build/slopreveal --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: slopreveal-linux-x64
          path: build/slopreveal
          retention-days: 14

  release-upload:
    name: Attach to release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: slopreveal-linux-x64

      - name: Rename binary
        run: mv slopreveal slopreveal-linux-x64

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: slopreveal-linux-x64
