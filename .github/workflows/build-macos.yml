name: Build (macOS)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x64
            runner: macos-13

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install capstone curl openssl cmake pkg-config

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl) \
            -DCMAKE_PREFIX_PATH=$(brew --prefix)

      - name: Build
        run: cmake --build build --parallel

      - name: Smoke test
        run: ./build/slopreveal --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: slopreveal-macos-${{ matrix.arch }}
          path: build/slopreveal
          retention-days: 14

  release-upload:
    name: Attach to release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: slopreveal-macos-*
          merge-multiple: true

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            slopreveal-macos-arm64
            slopreveal-macos-x64
