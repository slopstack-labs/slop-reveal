name: Build (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\packages
          key: vcpkg-x64-windows-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-x64-windows-

      - name: Install dependencies via vcpkg
        env:
          VCPKG_BINARY_SOURCES: "clear"
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install --triplet x64-windows

      - name: Configure
        run: |
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Smoke test
        run: ./build/Release/slopreveal.exe --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: slopreveal-windows-x64
          path: build/Release/slopreveal.exe
          retention-days: 14

  release-upload:
    name: Attach to release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: slopreveal-windows-x64

      - name: Rename binary
        run: mv slopreveal.exe slopreveal-windows-x64.exe

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: slopreveal-windows-x64.exe
